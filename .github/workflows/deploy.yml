name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/configure-pages@v5
      - run: npm install
      - name: Build
        run: npm run build
      - name: Debug output
        run: find . -name "index.html" -not -path "*/node_modules/*" 2>/dev/null
      - name: Locate client build and prepare deployment
        run: |
          if [ -d ".vinxi/dist/client" ]; then
            cp .vinxi/dist/client/index.html .vinxi/dist/client/404.html
            echo "DIR=.vinxi/dist/client" >> $GITHUB_ENV
          elif [ -d ".output/public" ]; then
            cp .output/public/index.html .output/public/404.html 2>/dev/null || true
            echo "DIR=.output/public" >> $GITHUB_ENV
          elif [ -d "dist" ]; then
            cp dist/index.html dist/404.html 2>/dev/null || true
            echo "DIR=dist" >> $GITHUB_ENV
          else
            echo "DIR=.output/public" >> $GITHUB_ENV
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
