name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/configure-pages@v5
      - run: npm install
      - run: npm run build
      - name: Debug output structure
        run: ls -R .output/ 2>/dev/null || ls -R dist/ 2>/dev/null || ls -R .vinxi/ 2>/dev/null || echo "NO OUTPUT FOUND"
      - name: Locate and copy index.html for SPA fallback
        run: |
          INDEX=$(find . -name "index.html" -path "*/public/*" 2>/dev/null | head -1)
          if [ -z "$INDEX" ]; then
            INDEX=$(find . -name "index.html" 2>/dev/null | grep -v node_modules | head -1)
          fi
          if [ -n "$INDEX" ]; then
            DIR=$(dirname "$INDEX")
            cp "$INDEX" "$DIR/404.html"
            echo "DIR=$DIR" >> $GITHUB_ENV
          else
            echo "DIR=.output/public" >> $GITHUB_ENV
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
